  FreeBSD-15-with-compiler-hardening_build:
    runs-on: ubuntu-latest
#    defaults:
#      run:
#        shell: cpa.sh {0}
    env:
      SSH: ssh -q -o StrictHostKeyChecking=no -i ed25519 -p 2222 runner@localhost
      FREEBSD_VERSION: 15.1-RELEASE
    strategy:
      fail-fast: false # Upload src/igr-tests/*/output/* files in igr-tests
      matrix:
        include:
          - arch: 'amd64'

    steps:
    - uses: actions/checkout@v6
    - name: Getting QEMU and xorriso
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install qemu-system xorriso -y
    - name: Getting FreeBSD BASIC-CI image
      run: |
        wget -nv https://download.freebsd.org/releases/CI-IMAGES/${FREEBSD_VERSION}/amd64/Latest/FreeBSD-${FREEBSD_VERSION}-amd64-BASIC-CI-ufs.raw.xz
        unxz FreeBSD-${FREEBSD_VERSION}-amd64-BASIC-CI-ufs.raw.xz
    - name: Providing configuration for FreeBSD nuageinit
      run: |
        ssh-keygen -t ed25519 -f ed25519 -N ""
        mkdir cidata
        cat << "_EOF" > cidata/user-data
        #cloud-config
        users:
          - default
          - name: runner
            sudo: ALL=(ALL) NOPASSWD:ALL
            ssh_authorized_keys:
              $(cat ed25519.pub)
        _EOF
        cat << "_EOF" > cidata/meta-data
        instance-id: github-actions
        local-hostname: freebsd-ci
        _EOF
        xorriso -as mkisofs -o cidata.iso -V cidata cidata/
    - name: Running the VM
      run: |
        sudo qemu-system-x86_64 \
         -machine accel=kvm \
         -m 2048 \
         -smp 2 \
         -drive file=FreeBSD-${FREEBSD_VERSION}-amd64-BASIC-CI-ufs.raw,format=raw \
         -drive file=cidata.iso,format=raw,media=cdrom \
         -nic user,hostfwd=tcp::2222-:22 \
         -nographic > qemu.log &
    - name: Copy files to VM
      run: scp -o StrictHostKeyChecking=no -i ed25519 -P2222 -r . ~/
    - name: Getting dependencies
      run: |
        $SSH sudo pkg update
        $SSH sudo pkg install -y gmake m4 file llvm
    - name: Print clang++ architecture and version
      run: |
        $SSH clang++ -dumpmachine
        $SSH clang++ --version
    - name: Configure
      run: |
        $SSH./configure CXXFLAGS="-std=c++11 \
        -flto \
        -fstack-clash-protection \
        -fvisibility=hidden \
        -fsanitize=cfi \
        -fsanitize=signed-integer-overflow,integer-divide-by-zero \
        -fsanitize-trap=signed-integer-overflow,integer-divide-by-zero \
        -fno-sanitize-recover"
    - name: Build
      run: |
        $SSH gmake
    - name: Print dinit executable file architecture
      run: |
        $SSH file ./src/dinit
    - name: Unit tests
      run: |
        $SSH gmake check
    - name: Integration tests
      run: |
        $SSH gmake check-igr
    - name: QEMU log
      if: always()
      run: cat qemu.log
