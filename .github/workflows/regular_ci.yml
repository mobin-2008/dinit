name: Dinit Regular CI

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/regular_ci.yml'
      - 'configure'
      - 'build/**'
      - 'configs/**'
      - 'dasynq/**'
      - 'src/**'
      - '**/Makefile'
      - '!build/mconfig.mesontemplate'
      - '!build/includes/README'
      - '!**/meson.build'
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/regular_ci.yml'
      - 'configure'
      - 'build/**'
      - 'configs/**'
      - 'dasynq/**'
      - 'src/**'
      - '**/Makefile'
      - '!build/mconfig.mesontemplate'
      - '!build/includes/README'
      - '!**/meson.build'
  workflow_dispatch:

jobs:

  Debian-bookworm_build:

    runs-on: ubuntu-24.04
    container:
      image: debian:bookworm
    strategy:
      fail-fast: false # Upload src/igr-tests/*/output/* files in igr-tests
      matrix:
        include:
          - arch: 'amd64'
          - arch: 'i386'

    steps:
    - uses: actions/checkout@v7
    - name: Add i386 repositories
      if: ${{ matrix.arch == 'i386' }}
      run: dpkg --add-architecture i386
    - name: Getting dependencies (amd64)
      if: ${{ matrix.arch == 'amd64' }}
      run: |
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install g++ make m4 libcap-dev file -y
    - name: Getting dependencies (i386)
      if: ${{ matrix.arch == 'i386' }}
      run: |
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install gcc:i386 make:i386 m4:i386 g++:i386 libcap-dev:i386 file -y
    - name: Print g++ architecture and version
      run: |
        g++ -dumpmachine
        g++ --version
    - name: Build
      run: make CXXFLAGS_EXTRA=-D_GLIBCXX_DEBUG TEST_CXXFLAGS_EXTRA=-D_GLIBCXX_DEBUG
    - name: Print dinit executable file architecture
      run: file ./src/dinit
    - name: Unit tests
      run: make check
    - name: Integration tests
      run: make check-igr
    - name: Upload igr-tests output file(s) on failure
      uses: actions/upload-artifact@v4.3.2
      if: failure()
      with:
          name: igr-tests_output
          path: src/igr-tests/*/output/*

  MacOS-latest_build:

    runs-on: macos-latest
    strategy:
      fail-fast: false # Upload src/igr-tests/*/output/* files in igr-tests
      matrix:
        include:
          - arch: 'aarch64'

    steps:
    - uses: actions/checkout@v7
    - name: Print g++ architecture and version
      run: |
        g++ -dumpmachine
        g++ --version
    - name: Build
      run: make
    - name: Print dinit executable file architecture
      run: file ./src/dinit
    - name: Unit tests
      run: make check
    - name: Integration tests
      run: make check-igr
    - name: Upload igr-tests output file(s) on failure
      uses: actions/upload-artifact@v4.3.2
      if: failure()
      with:
          name: igr-tests_output
          path: src/igr-tests/*/output/*

  Alpine-latest_build:

    runs-on: ubuntu-24.04
    container:
      image: alpine:latest
    strategy:
      fail-fast: false # Upload src/igr-tests/*/output/* files in igr-tests
      matrix:
        include:
          - arch: 'amd64'

    steps:
    - uses: actions/checkout@v7
    - name: Getting dependencies
      run: |
        apk update
        apk add make g++ m4 file libcap-dev
    - name: Print g++ architecture and version
      run: |
        g++ -dumpmachine
        g++ --version
    - name: Build
      run: make
    - name: Print dinit executable file architecture
      run: file ./src/dinit
    - name: Unit tests
      run: make check
    - name: Integration tests
      run: make check-igr
    - name: Upload igr-tests output file(s) on failure
      uses: actions/upload-artifact@v4.3.2
      if: failure()
      with:
          name: igr-tests_output
          path: src/igr-tests/*/output/*

  BSD_build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: cpa.sh {0} --environment-variables CXX
    env:
      # The NetBSD image has g++ 10 installed by default which is too old so always use clang++
      CXX: clang++
    strategy:
      fail-fast: false # Be able to upload src/igr-tests/igr-output/ files in igr-tests step
      matrix:
        include:
          - name: 'FreeBSD'
            version: '15.1'
            arch: 'amd64'
            hardening: 'clang_hardening'
          - name: 'OpenBSD'
            version: '7.9'
            arch: 'amd64'
          - name: 'NetBSD'
            version: '10.1'
            arch: 'amd64'

    steps:
    - uses: actions/checkout@v7
    - name: Run VM
      uses: cross-platform-actions/action@v1.3.0
      with:
        operating_system: ${{ matrix.name }}
        version: ${{ matrix.version }}
    - name: Getting dependencies (FreeBSD)
      if: ${{ matrix.name == 'FreeBSD' }}
      run: |
        sudo pkg update
        sudo pkg install -y gmake m4 file llvm
    - name: Getting dependencies (OpenBSD)
      if: ${{ matrix.name == 'OpenBSD' }}
      run: |
        sudo pkg_add -I gmake m4 llvm%21
    - name: Getting dependencies (NetBSD)
      if: ${{ matrix.name == 'NetBSD' }}
      run: |
        sudo pkgin update
        sudo pkgin -y install gmake m4 file clang
        g++ --version
    - name: Print clang++ architecture and version
      run: |
        clang++ -dumpmachine
        clang++ --version
    - name: Configure with Clang hardening flags
      if: ${{ matrix.hardening == 'clang_hardening' }}
      run: |
        ./configure CXXFLAGS="-std=c++11 \
        -flto \
        -fstack-clash-protection \
        -fvisibility=hidden \
        -fsanitize=cfi \
        -fsanitize=signed-integer-overflow,integer-divide-by-zero \
        -fsanitize-trap=signed-integer-overflow,integer-divide-by-zero \
        -fno-sanitize-recover"
    - name: Build
      run: gmake
    - name: Print dinit executable file architecture
      run: file ./src/dinit
    - name: Unit tests
      run: gmake check
    - name: Integration tests
      run: gmake check-igr
    - name: Upload igr-tests output file(s) on failure
      uses: actions/upload-artifact@v4.5.0
      if: failure()
      with:
        name: igr-tests_output
        path: src/igr-tests/igr-output/

